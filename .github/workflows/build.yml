name: Build and deploy legal pages

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build static HTML from CMS
        run: node scripts/build.mjs
        env:
          CMS_BASE_URL: https://app.oneclick.hk
      - name: Commit updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: sync legal pages from CMS"
          git push

